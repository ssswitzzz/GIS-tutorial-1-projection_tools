<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视频封面：分不清投影和定义投影？一个视频让你搞懂！</title>
  <!-- 引入谷歌思源宋体 Noto Serif SC 及等宽 JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">
  
  <style>
    /* 基础画布配置（1920x1080 视频封面标准尺寸 - 极简明亮纸质风） */
    body {
      margin: 0;
      padding: 0;
      width: 1920px;
      height: 1080px;
      background-color: #faf9f6;
      color: #29342f;
      font-family: "Noto Serif SC", "Source Han Serif CN", "思源宋体", serif;
      overflow: hidden;
      position: relative;
      box-sizing: border-box;
    }

    /* 矢量背景网格（极淡的纸张网格线） */
    .bg-grid {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: 0.8;
    }

    /* 左右微光分割带 */
    .divider-glow {
      position: absolute;
      left: 50%;
      top: 360px;
      bottom: 120px;
      width: 2px;
      background: linear-gradient(180deg, transparent, rgba(47, 55, 49, 0.08) 30%, rgba(47, 55, 49, 0.08) 70%, transparent);
      transform: translateX(-50%);
      z-index: 3;
    }

    /* 顶部标题区 */
    .header-container {
      position: absolute;
      top: 100px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 10;
    }

    /* 主标题 */
    .main-title {
      font-size: 84px;
      font-weight: 900;
      margin: 0;
      padding: 0;
      color: #1a221e;
      letter-spacing: 2px;
    }

    /* 强调文字 */
    .title-highlight-green {
      color: #3e6b4e;
    }
    .title-highlight-blue {
      color: #285b6c;
    }

    /* 副标题 */
    .subtitle {
      margin-top: 24px;
      color: #a77748;
      font-size: 44px;
      font-weight: 900;
      letter-spacing: 8px;
      text-indent: 8px;
    }

    /* 核心对比区布局 */
    .content-area {
      position: absolute;
      top: 360px;
      left: 120px;
      right: 120px;
      bottom: 80px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 5;
    }

    /* 左右分栏容器 */
    .column-box {
      width: 700px;
      height: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* 矢量概念大 icon 容器 */
    .icon-container {
      width: 280px;
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 40px;
      border-radius: 40px;
      background: #ffffff;
      box-shadow: 0 20px 50px rgba(47, 55, 49, 0.05);
      border: 1px solid rgba(47, 55, 49, 0.05);
    }

    /* 栏目主要文本 */
    .column-title {
      font-size: 54px;
      font-weight: 900;
      margin: 0;
      letter-spacing: 3px;
    }
    .column-title.green { color: #3e6b4e; }
    .column-title.blue { color: #285b6c; }

    /* 概念说明子标题 */
    .column-subtitle {
      font-size: 26px;
      font-weight: 700;
      color: #727670;
      margin-top: 18px;
      letter-spacing: 2px;
    }

    /* 底部标注（Illustrator 导入用） */
    .footer-note {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 15px;
      color: rgba(47, 55, 49, 0.3);
      z-index: 10;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <!-- 矢量背景网格（极简细线，AI 导入后为全矢量网格） -->
  <svg class="bg-grid" width="100%" height="100%">
    <defs>
      <pattern id="grid-pattern" width="60" height="60" patternUnits="userSpaceOnUse">
        <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(47, 55, 49, 0.05)" stroke-width="1.2"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#grid-pattern)" />
  </svg>

  <!-- 左右分割中轴线 -->
  <div class="divider-glow"></div>

  <!-- 顶部主副标题 -->
  <div class="header-container">
    <h1 class="main-title">
      分不清<span class="title-highlight-green">定义投影</span>和<span class="title-highlight-blue">投影</span>？
    </h1>
    <div class="subtitle">一个视频彻底搞懂！</div>
  </div>

  <!-- 核心对比区布局 -->
  <div class="content-area">
    
    <!-- 左半边：定义投影 (Define Projection) -->
    <div class="column-box">
      <!-- 矢量图标：地球 + 贴标签 -->
      <div class="icon-container">
        <svg width="180" height="180" viewBox="0 0 200 200">
          <!-- 地球经纬线网格 -->
          <circle cx="90" cy="110" r="60" fill="none" stroke="#3e6b4e" stroke-width="4.5" />
          <!-- 纬线 -->
          <path d="M 33 90 Q 90 120 147 90" fill="none" stroke="#3e6b4e" stroke-width="3" stroke-dasharray="3 3" opacity="0.6" />
          <path d="M 30 110 H 150" fill="none" stroke="#3e6b4e" stroke-width="3.5" opacity="0.8" />
          <path d="M 33 130 Q 90 100 147 130" fill="none" stroke="#3e6b4e" stroke-width="3" stroke-dasharray="3 3" opacity="0.6" />
          <!-- 经线 -->
          <path d="M 90 50 Q 60 110 90 170" fill="none" stroke="#3e6b4e" stroke-width="3" opacity="0.8" />
          <path d="M 90 50 Q 120 110 90 170" fill="none" stroke="#3e6b4e" stroke-width="3" opacity="0.8" />
          <path d="M 90 50 V 170" fill="none" stroke="#3e6b4e" stroke-width="3.5" opacity="0.8" />
          
          <!-- 悬挂的行李标签牌 (表示贴标签) -->
          <g transform="translate(110, 20)">
            <!-- 挂绳 -->
            <path d="M 5 35 Q -10 15 -10 35" fill="none" stroke="#a77748" stroke-width="3" stroke-linecap="round" />
            <!-- 吊牌 -->
            <rect x="0" y="30" width="46" height="66" rx="6" fill="#ffffff" stroke="#a77748" stroke-width="3.5" />
            <!-- 挂孔 -->
            <circle cx="8" cy="38" r="3" fill="#a77748" />
            <!-- 标签符号 -->
            <text x="23" y="74" font-family="'JetBrains Mono', monospace" font-size="28" font-weight="900" fill="#a77748" text-anchor="middle">$</text>
          </g>
        </svg>
      </div>
      
      <h2 class="column-title green">定义投影</h2>
      <div class="column-subtitle">【 贴 标 签 】</div>
    </div>

    <!-- 右半边：投影 (Project) -->
    <div class="column-box">
      <!-- 矢量图标：地球投影展平到平面坐标轴上 -->
      <div class="icon-container">
        <svg width="180" height="180" viewBox="0 0 200 200">
          <!-- 1. 圆形地球 (源数据) -->
          <circle cx="50" cy="70" r="35" fill="none" stroke="#285b6c" stroke-width="4.5" />
          <path d="M 15 70 H 85" fill="none" stroke="#285b6c" stroke-width="3" opacity="0.8" />
          <path d="M 50 35 V 105" fill="none" stroke="#285b6c" stroke-width="3" opacity="0.8" />
          
          <!-- 2. 变换转换流光箭头 (带有数学函数 f 装饰) -->
          <g transform="translate(75, 75)">
            <path d="M 10 0 Q 30 15 45 -5" fill="none" stroke="#a77748" stroke-width="4" stroke-linecap="round" stroke-dasharray="6 4" />
            <!-- 箭头尖端 -->
            <path d="M 40 -12 L 48 -6 L 41 1" fill="none" stroke="#a77748" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
            <text x="26" y="24" font-family="'JetBrains Mono', monospace" font-size="15" font-weight="800" fill="#a77748" text-anchor="middle">f(x)</text>
          </g>
          
          <!-- 3. 平面展平坐标系 (目标数据) -->
          <g transform="translate(130, 80)">
            <!-- 坐标轴 -->
            <path d="M 0 50 V 0 H 50" fill="none" stroke="#285b6c" stroke-width="4" stroke-linecap="round" />
            <!-- 平面网格网 -->
            <rect x="10" y="10" width="35" height="35" fill="none" stroke="#285b6c" stroke-width="3" stroke-dasharray="3 3" opacity="0.7" />
            <line x1="10" y1="27" x2="45" y2="27" stroke="#285b6c" stroke-width="2.5" opacity="0.5" />
            <line x1="27" y1="10" x2="27" y2="45" stroke="#285b6c" stroke-width="2.5" opacity="0.5" />
            <!-- X/Y 标签 -->
            <text x="56" y="8" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="800" fill="#285b6c">X</text>
            <text x="-4" y="64" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="800" fill="#285b6c">Y</text>
          </g>
        </svg>
      </div>
      
      <h2 class="column-title blue">投影变换</h2>
      <div class="column-subtitle">【 算 数 字 】</div>
    </div>

  </div>

  <!-- 底部页脚说明（作为 Illustrator 的文本图层导入） -->
  <div class="footer-note">
    注：本封面设计为 100% 极简明亮矢量风格，文字和图标完全可编辑，使用浏览器打印为 PDF 后可完美导入 Adobe Illustrator 调整。
  </div>

</body>
</html>
