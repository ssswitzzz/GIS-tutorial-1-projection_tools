<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视频封面：分不清投影和定义投影？一个视频让你搞懂！</title>
  <!-- 引入谷歌思源宋体 Noto Serif SC 及等宽 JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">
  
  <style>
    /* 基础画布配置（1920x1080 视频封面标准尺寸 - 极简明亮纸质风） */
    body {
      margin: 0;
      padding: 0;
      width: 1920px;
      height: 1080px;
      background-color: #faf9f6;
      color: #29342f;
      font-family: "Noto Serif SC", "Source Han Serif CN", "思源宋体", serif;
      overflow: hidden;
      position: relative;
      box-sizing: border-box;
    }

    /* 矢量背景网格（极淡的纸张网格线） */
    .bg-grid {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: 0.8;
    }

    /* 左右微光分割带 */
    .divider-glow {
      position: absolute;
      left: 50%;
      top: 360px;
      bottom: 120px;
      width: 2px;
      background: linear-gradient(180deg, transparent, rgba(47, 55, 49, 0.08) 30%, rgba(47, 55, 49, 0.08) 70%, transparent);
      transform: translateX(-50%);
      z-index: 3;
    }

    /* 顶部标题区 */
    .header-container {
      position: absolute;
      top: 100px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 10;
    }

    /* 主标题 */
    .main-title {
      font-size: 84px;
      font-weight: 900;
      margin: 0;
      padding: 0;
      color: #1a221e;
      letter-spacing: 2px;
    }

    /* 强调文字 */
    .title-highlight-green {
      color: #3e6b4e;
    }
    .title-highlight-blue {
      color: #285b6c;
    }

    /* 副标题 */
    .subtitle {
      margin-top: 24px;
      color: #a77748;
      font-size: 44px;
      font-weight: 900;
      letter-spacing: 8px;
      text-indent: 8px;
    }

    /* 核心对比区布局 */
    .content-area {
      position: absolute;
      top: 360px;
      left: 120px;
      right: 120px;
      bottom: 80px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 5;
    }

    /* 左右分栏容器 */
    .column-box {
      width: 700px;
      height: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* 矢量概念大 icon 容器 */
    .icon-container {
      width: 280px;
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 40px;
      border-radius: 40px;
      background: #ffffff;
      box-shadow: 0 20px 50px rgba(47, 55, 49, 0.05);
      border: 1px solid rgba(47, 55, 49, 0.05);
    }

    /* 栏目主要文本 */
    .column-title {
      font-size: 54px;
      font-weight: 900;
      margin: 0;
      letter-spacing: 3px;
    }
    .column-title.green { color: #3e6b4e; }
    .column-title.blue { color: #285b6c; }

    /* 概念说明子标题 */
    .column-subtitle {
      font-size: 26px;
      font-weight: 700;
      color: #727670;
      margin-top: 18px;
      letter-spacing: 2px;
    }

    /* 底部标注（Illustrator 导入用） */
    .footer-note {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 15px;
      color: rgba(47, 55, 49, 0.3);
      z-index: 10;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <!-- 矢量背景网格（极简细线，AI 导入后为全矢量网格） -->
  <svg class="bg-grid" width="100%" height="100%">
    <defs>
      <pattern id="grid-pattern" width="60" height="60" patternUnits="userSpaceOnUse">
        <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(47, 55, 49, 0.05)" stroke-width="1.2"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#grid-pattern)" />
  </svg>

  <!-- 左右分割中轴线 -->
  <div class="divider-glow"></div>

  <!-- 顶部主副标题 -->
  <div class="header-container">
    <h1 class="main-title">
      分不清<span class="title-highlight-green">定义投影</span>和<span class="title-highlight-blue">投影</span>？
    </h1>
    <div class="subtitle">一个视频彻底搞懂！</div>
  </div>

  <!-- 核心对比区布局 -->
  <div class="content-area">
    
    <!-- 左半边：定义投影 (Define Projection) -->
    <div class="column-box">
      <!-- 矢量图标：地球 + 贴标签 -->
      <div class="icon-container">
        <svg width="200" height="200" viewBox="0 0 200 200" style="overflow: visible;">
          <!-- 装饰性圆形刻度盘/轨道 -->
          <circle cx="90" cy="105" r="70" fill="none" stroke="#3e6b4e" stroke-width="1.2" stroke-dasharray="4 6" opacity="0.3" />
          <!-- 轨道上的刻度数值 -->
          <text x="90" y="27" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="800" fill="#3e6b4e" opacity="0.5" text-anchor="middle">0.00°</text>
          <text x="168" y="108" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="800" fill="#3e6b4e" opacity="0.5">90.00°</text>
          
          <!-- 3D经纬线地球 -->
          <circle cx="90" cy="105" r="55" fill="none" stroke="#3e6b4e" stroke-width="2.5" />
          <!-- 经线 (3D 弧线) -->
          <ellipse cx="90" cy="105" rx="24" ry="55" fill="none" stroke="#3e6b4e" stroke-width="1.5" />
          <ellipse cx="90" cy="105" rx="42" ry="55" fill="none" stroke="#3e6b4e" stroke-width="1.2" stroke-dasharray="3 2" opacity="0.7" />
          <line x1="90" y1="50" x2="90" y2="160" stroke="#3e6b4e" stroke-width="1.5" />
          
          <!-- 纬线 (3D 弧线) -->
          <line x1="35" y1="105" x2="145" y2="105" stroke="#3e6b4e" stroke-width="2" />
          <path d="M 42 75 Q 90 90 138 75" fill="none" stroke="#3e6b4e" stroke-width="1.2" opacity="0.8" />
          <path d="M 42 135 Q 90 120 138 135" fill="none" stroke="#3e6b4e" stroke-width="1.2" opacity="0.6" stroke-dasharray="3 2" />
          
          <!-- 贴标签/定义过程的指示虚线与标签牌 -->
          <g transform="translate(0, 0)">
            <!-- 指向圆心的引线 -->
            <path d="M 90 105 L 132 63 H 146" fill="none" stroke="#a77748" stroke-width="1.5" stroke-dasharray="3 3" />
            <!-- 引线圆点 -->
            <circle cx="90" cy="105" r="4" fill="#a77748" />
            <!-- 标签牌 -->
            <rect x="142" y="48" width="52" height="26" rx="4" fill="#ffffff" stroke="#a77748" stroke-width="2" />
            <text x="168" y="65" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="900" fill="#a77748" text-anchor="middle">WGS 84</text>
            <!-- 标签上的小标识 -->
            <text x="168" y="42" font-family="'JetBrains Mono', monospace" font-size="8" font-weight="800" fill="#727670" text-anchor="middle">METADATA</text>
          </g>
        </svg>
      </div>
      
      <h2 class="column-title green">定义投影</h2>
      <div class="column-subtitle">【 贴 标 签 】</div>
    </div>

    <!-- 右半边：投影 (Project) -->
    <div class="column-box">
      <!-- 矢量图标：地球投影展平到平面坐标轴上 -->
      <div class="icon-container">
        <svg width="200" height="200" viewBox="0 0 200 200" style="overflow: visible;">
          <!-- 1. 3D地球 (源数据，位于左上) -->
          <g transform="translate(10, 5)">
            <circle cx="45" cy="50" r="36" fill="none" stroke="#285b6c" stroke-width="2.2" />
            <ellipse cx="45" cy="50" rx="16" ry="36" fill="none" stroke="#285b6c" stroke-width="1.3" opacity="0.8" />
            <line x1="9" y1="50" x2="81" y2="50" stroke="#285b6c" stroke-width="1.6" />
            <line x1="45" y1="14" x2="45" y2="86" stroke="#285b6c" stroke-width="1.3" opacity="0.6" />
          </g>
          
          <!-- 2. 变换投影射线 (金色虚线，代表数学计算投影映射) -->
          <!-- 射线1 (中心点到网格中心) -->
          <path d="M 55 55 C 80 75 110 105 168 138" fill="none" stroke="#a77748" stroke-width="1.6" stroke-dasharray="3 3" opacity="0.8" />
          <!-- 辅助射线2 (上部) -->
          <path d="M 55 19 C 90 48 115 78 173 113" fill="none" stroke="#a77748" stroke-width="1" stroke-dasharray="3 3" opacity="0.4" />
          <!-- 辅助射线3 (下部) -->
          <path d="M 55 91 C 75 108 105 130 158 163" fill="none" stroke="#a77748" stroke-width="1" stroke-dasharray="3 3" opacity="0.4" />
          
          <!-- 投影变换函数符号说明 -->
          <text x="110" y="80" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="900" fill="#a77748" text-anchor="middle">f(φ,λ)</text>
          
          <!-- 3. 平面透视坐标系及网格 (目标数据，位于右下) -->
          <g transform="translate(108, 95)">
            <!-- 坐标面 (网格) -->
            <polygon points="25,48 70,18 105,38 60,68" fill="#285b6c08" stroke="#285b6c" stroke-width="2.2" />
            <!-- 内网格虚线 -->
            <line x1="36" y1="40.5" x2="71" y2="64" stroke="#285b6c" stroke-width="1" opacity="0.3" stroke-dasharray="2 2" />
            <line x1="47" y1="33" x2="82" y2="56" stroke="#285b6c" stroke-width="1" opacity="0.3" stroke-dasharray="2 2" />
            <line x1="58" y1="25.5" x2="93" y2="49" stroke="#285b6c" stroke-width="1" opacity="0.3" stroke-dasharray="2 2" />
            
            <line x1="36" y1="40.5" x2="71" y2="17.5" stroke="#285b6c" stroke-width="1" opacity="0.3" stroke-dasharray="2 2" />
            <line x1="47" y1="48" x2="82" y2="25" stroke="#285b6c" stroke-width="1" opacity="0.3" stroke-dasharray="2 2" />
            <line x1="58" y1="55.5" x2="93" y2="32.5" stroke="#285b6c" stroke-width="1" opacity="0.3" stroke-dasharray="2 2" />
            
            <!-- X/Y 轴指示线 -->
            <line x1="25" y1="48" x2="10" y2="58" stroke="#285b6c" stroke-width="1.5" stroke-dasharray="2 1" />
            <text x="5" y="68" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="900" fill="#285b6c">Y</text>
            
            <line x1="105" y1="38" x2="118" y2="43" stroke="#285b6c" stroke-width="1.5" stroke-dasharray="2 1" />
            <text x="122" y="47" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="900" fill="#285b6c">X</text>
          </g>
        </svg>
      </div>
      
      <h2 class="column-title blue">投影</h2>
      <div class="column-subtitle">【 算 数 字 】</div>
    </div>

  </div>

  <!-- 底部页脚说明（作为 Illustrator 的文本图层导入） -->
  <div class="footer-note">
    注：本封面设计为 100% 极简明亮矢量风格，文字和图标完全可编辑，使用浏览器打印为 PDF 后可完美导入 Adobe Illustrator 调整。
  </div>

</body>
</html>
